# Name of our action
name: Release

# The event that will trigger the action
# Disabled: requires auto release tooling + NPM_TOKEN configured.
# Enable by uncommenting below once release process is set up.
# on:
#   push:
#     branches: [main]
on: workflow_dispatch

# what the action will do
jobs:
  release:
    # The operating system it will run on
    runs-on: ubuntu-latest
    # This check needs to be in place to prevent a publish loop with auto and github actions
    if: "!contains(github.event.head_commit.message, 'ci skip') && !contains(github.event.head_commit.message, 'skip ci')"
    # The list of steps that the action will go through
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare repository
        run: git fetch --unshallow --tags

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm check

      - name: Build
        env:
          BASEHUB_TOKEN: ""
          BETTER_AUTH_SECRET: dummy-ci-secret-32-chars-long-for-build
          NEXT_PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_WEB_URL: http://localhost:3001
          RESEND_FROM: ci@example.com
          RESEND_TOKEN: re_dummyci
          STRIPE_SECRET_KEY: sk_dummy_ci_secret_key_for_build
        run: pnpm exec turbo build --filter '!storybook'

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npx auto shipit
