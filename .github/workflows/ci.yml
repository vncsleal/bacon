name: CI

on:
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          run_install: false

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm -r typecheck

      - name: Lint
        run: pnpm check

      - name: Build
        env:
          BASEHUB_TOKEN: ""
          BETTER_AUTH_SECRET: dummy-ci-secret-32-chars-long-for-build
          NEXT_PUBLIC_CONVEX_URL: https://placeholder.convex.cloud
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          NEXT_PUBLIC_WEB_URL: http://localhost:3001
          RESEND_FROM: ci@example.com
          RESEND_TOKEN: re_dummyci
          STRIPE_SECRET_KEY: sk_dummy_ci_secret_key_for_build
        run: pnpm exec turbo build --filter '!storybook'
